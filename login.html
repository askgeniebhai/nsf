<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Neela Security Force</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background: #0B1F3A; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; font-family: 'Poppins', sans-serif; }
        .login-card { background: white; padding: 40px; border-radius: 16px; width: 100%; max-width: 400px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        .login-header { text-align: center; margin-bottom: 30px; }
        .login-header img { height: 60px; margin-bottom: 15px; }
        .login-header h1 { font-size: 24px; color: #0B1F3A; margin: 0; }
        .login-header p { color: #64748b; font-size: 14px; margin-top: 5px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: #0B1F3A; margin-bottom: 8px; }
        .form-group input, .form-group select { width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px; outline: none; transition: border-color 0.2s; }
        .form-group input:focus { border-color: #D4AF37; }
        .btn-login { width: 100%; padding: 14px; background: #0B1F3A; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        .btn-login:hover { background: #162E4D; }
        .footer-links { text-align: center; margin-top: 20px; font-size: 13px; color: #64748b; }
        .footer-links a { color: #D4AF37; text-decoration: none; font-weight: 600; }
        @media (max-width: 480px) {
            body { align-items: flex-start; padding: 20px 14px; }
            .login-card { padding: 28px 20px; }
        }
    </style>
</head>
<body>

<div class="login-card">
    <div class="login-header">
        <img src="assets/images/logo.png" alt="NSF Logo">
        <h1>NSF Portal Login</h1>
        <p>Access your dashboard securely</p>
    </div>

    <form id="loginForm">
        <div id="error-message" style="color: #dc2626; background: #fef2f2; border: 1px solid #ef4444; border-radius: 8px; padding: 10px; margin-bottom: 20px; font-size: 13px; text-align: center; display: none; font-weight: 500;"></div>
        <div class="form-group">
            <label>Role</label>
            <select id="role" required>
                <option value="guard">Guard</option>
                <option value="supervisor">Supervisor</option>
                <option value="admin">Administrator</option>
                <option value="client">Client</option>
            </select>
        </div>
        <div class="form-group">
            <label>Employee ID / Username</label>
            <input type="text" id="username" placeholder="e.g. NFS-9921" required>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••" required>
        </div>
        <button type="submit" id="btn-submit" class="btn-login">Sign In</button>
    </form>

    <div class="footer-links">
        <p>Emergency? <a href="tel:918310457215">Call Dispatch</a></p>
    </div>
</div>

<script src="js/seed.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
