<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Identity Profile | NSF Guard</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background: #f8fafc; font-family: 'Poppins', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 260px; background: #0B1F3A; color: white; display: flex; flex-direction: column; }
        .main-content { flex: 1; display: flex; flex-direction: column; overflow-y: auto; }
        .top-nav { height: 70px; background: white; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: space-between; padding: 0 40px; }
        .content-body { padding: 40px; max-width: 800px; margin: 0 auto; width: 100%; }

        .profile-card { background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); overflow: hidden; margin-bottom: 30px; }
        .profile-header { background: #0B1F3A; color: white; padding: 30px; text-align: center; position: relative; }
        .profile-photo { width: 120px; height: 120px; border-radius: 50%; border: 4px solid white; object-fit: cover; background: #e2e8f0; margin: 0 auto 15px; display: block; }
        .profile-header h2 { margin: 0; font-size: 24px; color: white; }
        .profile-header p { margin: 5px 0 0 0; color: #D4AF37; font-weight: 600; }

        .profile-details { padding: 30px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .detail-item label { display: block; font-size: 11px; text-transform: uppercase; color: #64748b; font-weight: 700; margin-bottom: 5px; }
        .detail-item p { margin: 0; font-size: 14px; font-weight: 500; color: #0B1F3A; }

        .docs-section { padding: 30px; border-top: 1px solid #f1f5f9; }
        .docs-section h3 { margin: 0 0 20px 0; font-size: 16px; }
        .doc-list { display: flex; flex-direction: column; gap: 15px; }
        .doc-item { display: flex; align-items: center; justify-content: space-between; padding: 15px; border: 1px solid #e2e8f0; border-radius: 8px; }
        .doc-info { display: flex; align-items: center; gap: 15px; }
        .doc-info i { color: #64748b; }
        .doc-status { font-size: 12px; font-weight: 600; padding: 4px 10px; border-radius: 20px; }
        .doc-status.uploaded { background: #ecfdf5; color: #059669; }
        .doc-status.missing { background: #fef2f2; color: #ef4444; }

        .btn-update { background: transparent; border: 1px solid #0B1F3A; color: #0B1F3A; padding: 8px 15px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-update:hover { background: #0B1F3A; color: white; }

        .upload-wrapper { position: relative; display: inline-block; }
        .upload-wrapper input[type=file] { position: absolute; left: 0; top: 0; opacity: 0; width: 100%; height: 100%; cursor: pointer; }

        @media (max-width: 768px) {
            .profile-details { grid-template-columns: 1fr; }
            .content-body { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="sidebar"></div>
    <div class="main-content">
        <div class="top-nav"></div>
        <div class="content-body" id="guard-profile-container">
            <!-- Rendered via JS -->
        </div>
    </div>

    <script src="../js/StorageService.js"></script>
    <script src="../js/seed.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/ui-components.js"></script>
    <script src="../js/identity.js"></script>
    <script>
        const user = AuthService.checkAuth('guard');
        UI.renderSidebar('profile');
        UI.renderTopNav('Identity Profile');
        IdentityModule.initGuard(user.id);
    </script>
</body>
</html>
