<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Incident Report | NSF</title>
    <link rel="stylesheet" href="../css/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body style="background:#f1f5f9; font-family:sans-serif; padding:20px;">
    <div style="max-width:500px; margin:0 auto; background:white; padding:30px; border-radius:12px; box-shadow:0 4px 6px rgba(0,0,0,0.05);">
        <h2>Report Incident</h2>
        <form onsubmit="alert('Report submitted to HQ'); window.location.href='dashboard.html'; return false;">
            <div style="margin-bottom:15px;">
                <label style="display:block; margin-bottom:5px; font-weight:600;">Type</label>
                <select style="width:100%; padding:10px; border:1px solid #ddd; border-radius:6px;">
                    <option>Theft</option>
                    <option>Unauthorized Entry</option>
                    <option>Medical Emergency</option>
                    <option>Fire Alarm</option>
                    <option>Other</option>
                </select>
            </div>
            <div style="margin-bottom:15px;">
                <label style="display:block; margin-bottom:5px; font-weight:600;">Description</label>
                <textarea style="width:100%; height:100px; padding:10px; border:1px solid #ddd; border-radius:6px;"></textarea>
            </div>
            <button type="submit" style="width:100%; padding:12px; background:#0B1F3A; color:white; border:none; border-radius:6px; font-weight:600;">Submit Report</button>
            <a href="dashboard.html" style="display:block; text-align:center; margin-top:15px; color:#64748b; text-decoration:none;">Cancel</a>
        </form>
    </div>
</body>
</html>
