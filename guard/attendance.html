<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance | NSF</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background: #f1f5f9; min-height: 100vh; padding-bottom: 80px; }
        .g-header { background: #0B1F3A; color: white; padding: 20px; display: flex; align-items: center; gap: 15px; }
        .g-header a { color: white; }
        .g-header h1 { font-size: 18px; margin: 0; color: white; }
        .g-container { padding: 20px; max-width: 600px; margin: 0 auto; }
        .att-card { background: white; border-radius: 16px; padding: 30px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; }
        .btn-att { width: 100%; padding: 18px; border-radius: 12px; font-size: 18px; font-weight: 700; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 20px; transition: all 0.2s; }
        .btn-check-in { background: #10b981; color: white; }
        .btn-check-out { background: #ef4444; color: white; }
        .btn-disabled { background: #94a3b8; color: white; cursor: not-allowed; }
        .status-badge { display: inline-block; padding: 6px 16px; border-radius: 20px; font-size: 14px; font-weight: 600; margin-bottom: 25px; }
        .status-on { background: #ecfdf5; color: #059669; }
        .status-off { background: #fef2f2; color: #dc2626; }
        .loc-info { font-size: 12px; color: #64748b; margin-top: 20px; background: #f8fafc; padding: 15px; border-radius: 8px; }
        #live-toggle-wrap { margin-top: 30px; display: flex; align-items: center; justify-content: space-between; padding: 15px; background: white; border-radius: 12px; }
    </style>
</head>
<body>

<div class="g-header">
    <a href="dashboard.html"><i data-lucide="chevron-left"></i></a>
    <h1>Mark Attendance</h1>
</div>

<div class="g-container">
    <div class="att-card">
        <div id="duty-status" class="status-badge status-off">OFF DUTY</div>

        <div id="att-controls">
            <button id="btn-check-in" class="btn-att btn-check-in">
                <i data-lucide="log-in"></i> Check In
            </button>
            <button id="btn-check-out" class="btn-att btn-check-out" style="display: none;">
                <i data-lucide="log-out"></i> Check Out
            </button>
        </div>

        <div id="status-msg" style="margin-top: 15px; font-size: 14px; font-weight: 600;"></div>

        <div class="loc-info">
            <p id="loc-text"><i data-lucide="map-pin" class="icon-sm"></i> Location Permission Required</p>
            <p id="loc-coords" style="margin-top: 5px; opacity: 0.7; font-family: monospace;"></p>
        </div>
    </div>

    <div id="live-toggle-wrap">
        <div style="display: flex; align-items: center; gap: 10px;">
            <i data-lucide="navigation"></i>
            <div>
                <p style="font-size: 14px; font-weight: 600; margin: 0;">Share Live Location</p>
                <p style="font-size: 11px; color: #64748b; margin: 0;">Allow HQ to see your position</p>
            </div>
        </div>
        <input type="checkbox" id="live-location-toggle" style="width: 20px; height: 20px;">
    </div>
</div>

<div class="bottom-nav">
    <a href="dashboard.html" class="nav-link"><i data-lucide="layout-dashboard"></i>Dashboard</a>
    <a href="attendance.html" class="nav-link active"><i data-lucide="map-pin"></i>Attendance</a>
    <a href="profile.html" class="nav-link"><i data-lucide="user"></i>Profile</a>
</div>

<script src="../js/StorageService.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/attendance.js"></script>
<script>
    AuthService.checkAuth('guard');
    lucide.createIcons();
</script>
</body>
</html>
