<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attendance Log | NSF Admin</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background: #f8fafc; font-family: 'Poppins', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 260px; background: #0B1F3A; color: white; display: flex; flex-direction: column; }
        .main-content { flex: 1; display: flex; flex-direction: column; overflow-y: auto; }
        .top-nav { height: 70px; background: white; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: space-between; padding: 0 40px; }
        .content-body { padding: 40px; }
        .table-card { background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); overflow: hidden; }
        .p-table { width: 100%; border-collapse: collapse; text-align: left; }
        .p-table th { background: #f8fafc; padding: 15px 25px; font-size: 11px; text-transform: uppercase; color: #64748b; font-weight: 700; }
        .p-table td { padding: 15px 25px; border-bottom: 1px solid #f1f5f9; font-size: 13px; }
        .filters { display: flex; gap: 20px; margin-bottom: 30px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .filters select, .filters input { padding: 10px; border: 1px solid #e2e8f0; border-radius: 6px; font-size: 13px; }
    </style>
</head>
<body>
    <div class="sidebar"></div>
    <div class="main-content">
        <div class="top-nav"></div>
        <div class="content-body">
            <div class="filters">
                <input type="date" id="filter-date">
                <select id="filter-site">
                    <option value="all">All Sites</option>
                    <option value="Tech Park Alpha">Tech Park Alpha</option>
                </select>
                <select id="filter-type">
                    <option value="all">All Types</option>
                    <option value="Check In">Check In</option>
                    <option value="Check Out">Check Out</option>
                </select>
            </div>
            <div class="table-card">
                <table class="p-table">
                    <thead>
                        <tr>
                            <th>Date & Time</th>
                            <th>Guard</th>
                            <th>Type</th>
                            <th>Site</th>
                            <th>GPS</th>
                        </tr>
                    </thead>
                    <tbody id="log-body"></tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="../../platform/services/StorageService.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/ui-components.js"></script>
    <script>
        AuthService.checkAuth('admin');
        UI.renderSidebar('attendance');
        UI.renderTopNav('Attendance Register');

        function renderLogs() {
            const logs = StorageService.load('nsf_attendance_logs', []);
            const body = document.getElementById('log-body');
            body.innerHTML = logs.slice().reverse().map(l => `
                <tr>
                    <td>${new Date(l.timestamp).toLocaleString()}</td>
                    <td><strong>${l.userName}</strong> (${l.userId})</td>
                    <td><span style="color:${l.type==='Check In'?'#10b981':'#ef4444'}">${l.type}</span></td>
                    <td>${l.site}</td>
                    <td>${l.lat.toFixed(4)}, ${l.lng.toFixed(4)}</td>
                </tr>
            `).join('') || '<tr><td colspan="5" style="text-align:center; padding:40px;">No logs found.</td></tr>';
        }
        renderLogs();
    </script>
</body>
</html>
