<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payroll Management | NSF Admin</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background: #f8fafc; font-family: 'Poppins', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 260px; background: #0B1F3A; color: white; display: flex; flex-direction: column; }
        .main-content { flex: 1; display: flex; flex-direction: column; overflow-y: auto; }
        .top-nav { height: 70px; background: white; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: space-between; padding: 0 40px; }
        .content-body { padding: 40px; }
        .payroll-card { background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); padding: 30px; margin-bottom: 30px; }
        .table-wrap { background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); overflow: hidden; }
        .p-table { width: 100%; border-collapse: collapse; text-align: left; }
        .p-table th { background: #f8fafc; padding: 15px 25px; font-size: 11px; text-transform: uppercase; color: #64748b; }
        .p-table td { padding: 15px 25px; border-bottom: 1px solid #f1f5f9; font-size: 13px; }
    </style>
</head>
<body>
    <div class="sidebar"></div>
    <div class="main-content">
        <div class="top-nav"></div>
        <div class="content-body">
            <div class="payroll-card">
                <h3 style="margin-top: 0;">Salary Framework</h3>
                <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px;">
                    <div>
                        <label style="font-size: 12px; color: #64748b;">Basic Daily Wage (Guard)</label>
                        <p style="font-size: 18px; font-weight: 700; margin: 5px 0;">₹ 650.00</p>
                    </div>
                    <div>
                        <label style="font-size: 12px; color: #64748b;">OT Rate (Per Hour)</label>
                        <p style="font-size: 18px; font-weight: 700; margin: 5px 0;">₹ 120.00</p>
                    </div>
                    <div>
                        <label style="font-size: 12px; color: #64748b;">PF/ESI Deduction</label>
                        <p style="font-size: 18px; font-weight: 700; margin: 5px 0;">12.5%</p>
                    </div>
                </div>
            </div>
            <div class="table-wrap">
                <div style="padding: 20px 25px; border-bottom: 1px solid #f1f5f9; display:flex; justify-content:space-between; align-items:center;">
                    <h3 style="margin: 0;">Employee Salary Register (Draft)</h3>
                    <input type="month" value="2026-07" style="padding:5px; border:1px solid #e2e8f0; border-radius:4px;">
                </div>
                <table class="p-table">
                    <thead>
                        <tr>
                            <th>Employee</th>
                            <th>Days Present</th>
                            <th>Absents</th>
                            <th>OT Hours</th>
                            <th>Gross Salary</th>
                            <th>Net Payable</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="payroll-body"></tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="../js/StorageService.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/ui-components.js"></script>
    <script>
        AuthService.checkAuth('admin');
        UI.renderSidebar('payroll');
        UI.renderTopNav('Payroll Processing');

        function renderPayroll() {
            const logs = StorageService.load('nsf_attendance_logs', []);
            const employees = [
                { id: 'NFS-9921', name: 'John Smith', rank: 'Guard' },
                { id: 'NFS-001', name: 'Rajesh Kumar', rank: 'Head Guard' }
            ];
            const body = document.getElementById('payroll-body');
            body.innerHTML = employees.map(emp => {
                const presentDays = logs.filter(l => l.userId === emp.id && l.type === 'Check In').length;
                const gross = presentDays * 650;
                const net = gross * 0.875;
                return `
                    <tr>
                        <td><strong>${emp.name}</strong><br><small>${emp.id}</small></td>
                        <td>${presentDays}</td>
                        <td>${26 - presentDays}</td>
                        <td>0</td>
                        <td>₹ ${gross.toFixed(2)}</td>
                        <td style="font-weight: 700;">₹ ${net.toFixed(2)}</td>
                        <td><span style="color: #d97706; font-size: 11px; font-weight: 700; text-transform: uppercase;">Draft</span></td>
                    </tr>
                `;
            }).join('');
        }
        renderPayroll();
    </script>
</body>
</html>
