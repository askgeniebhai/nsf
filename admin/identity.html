<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identity Management | NSF Admin</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background: #f8fafc; font-family: 'Poppins', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 260px; background: #0B1F3A; color: white; display: flex; flex-direction: column; }
        .main-content { flex: 1; display: flex; flex-direction: column; overflow-y: auto; }
        .top-nav { height: 70px; background: white; border-bottom: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: space-between; padding: 0 40px; }
        .content-body { padding: 40px; }

        .controls-bar { display: flex; gap: 15px; margin-bottom: 25px; flex-wrap: wrap; }
        .p-search { position: relative; width: 300px; flex-grow: 1; max-width: 400px; }
        .p-search i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #64748b; width: 14px; height: 14px; }
        .p-search input { width: 100%; padding: 12px 15px 12px 45px; border-radius: 8px; border: 1px solid #e2e8f0; outline: none; }
        .p-filter select { padding: 12px 15px; border-radius: 8px; border: 1px solid #e2e8f0; outline: none; background: white; }

        .grid-view { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
        .id-card { background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); overflow: hidden; display: flex; flex-direction: column; }
        .id-card-header { padding: 20px; border-bottom: 1px solid #f1f5f9; display: flex; align-items: center; gap: 15px; }
        .id-photo { width: 50px; height: 50px; border-radius: 50%; background: #e2e8f0; object-fit: cover; }
        .id-card-body { padding: 20px; flex-grow: 1; }
        .id-card-body p { margin: 5px 0; font-size: 13px; color: #64748b; display: flex; justify-content: space-between; }
        .id-card-body p span { font-weight: 500; color: #0B1F3A; }
        .id-card-footer { padding: 15px 20px; background: #f8fafc; border-top: 1px solid #f1f5f9; display: flex; gap: 10px; }
        .btn-action { flex: 1; padding: 8px; text-align: center; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; border: none; transition: 0.2s; }
        .btn-view { background: #0B1F3A; color: white; }
        .btn-view:hover { background: #162E4D; }
        .btn-docs { background: rgba(212, 175, 55, 0.1); color: #B8962E; border: 1px solid rgba(212, 175, 55, 0.2); }
        .btn-docs:hover { background: rgba(212, 175, 55, 0.2); }

        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(11, 31, 58, 0.8); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
        .modal-overlay.active { display: flex; }
        .modal-content { background: white; border-radius: 12px; width: 100%; max-width: 800px; max-height: 90vh; display: flex; flex-direction: column; overflow: hidden; }
        .modal-header { padding: 20px 30px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
        .modal-header h2 { margin: 0; font-size: 18px; color: #0B1F3A; }
        .modal-close { background: none; border: none; font-size: 24px; cursor: pointer; color: #64748b; }
        .modal-body { padding: 30px; overflow-y: auto; flex-grow: 1; }

        .doc-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .doc-item { border: 1px solid #e2e8f0; border-radius: 8px; padding: 15px; text-align: center; position: relative; }
        .doc-item h4 { margin: 0 0 10px 0; font-size: 13px; color: #0B1F3A; }
        .doc-preview { width: 100%; height: 120px; background: #f8fafc; border-radius: 6px; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 1px dashed #cbd5e1; }
        .doc-preview img { width: 100%; height: 100%; object-fit: cover; }
        .doc-actions { display: flex; gap: 5px; justify-content: center; }
        .btn-sm { padding: 5px 10px; font-size: 11px; border-radius: 4px; cursor: pointer; border: none; }

        .upload-btn-wrapper { position: relative; overflow: hidden; display: inline-block; }
        .upload-btn-wrapper input[type=file] { font-size: 100px; position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer; height: 100%; }

    </style>
</head>
<body>
    <div class="sidebar"></div>
    <div class="main-content">
        <div class="top-nav"></div>
        <div class="content-body">

            <div class="controls-bar">
                <div class="p-search">
                    <i data-lucide="search"></i>
                    <input type="text" id="search-emp" placeholder="Search by name, ID or mobile...">
                </div>
                <div class="p-filter">
                    <select id="filter-designation">
                        <option value="">All Designations</option>
                        <option value="Security Guard">Security Guard</option>
                        <option value="Head Guard">Head Guard</option>
                        <option value="Supervisor">Supervisor</option>
                        <option value="CCTV Operator">CCTV Operator</option>
                    </select>
                </div>
                <div class="p-filter">
                    <select id="filter-status">
                        <option value="">All Status</option>
                        <option value="Active">Active</option>
                        <option value="Inactive">Inactive</option>
                    </select>
                </div>
            </div>

            <div id="emp-grid" class="grid-view">
                <!-- Dynamic Content -->
            </div>

        </div>
    </div>

    <!-- Documents Modal -->
    <div id="docs-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-emp-name">Employee Documents</h2>
                <button class="modal-close" onclick="closeDocsModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="doc-grid">
                    <!-- Photo -->
                    <div class="doc-item">
                        <h4>Profile Photo</h4>
                        <div class="doc-preview" id="preview-photo">
                            <i data-lucide="image" style="color:#cbd5e1; width:32px; height:32px;"></i>
                        </div>
                        <div class="doc-actions upload-btn-wrapper">
                            <button class="btn-sm btn-view">Upload Image</button>
                            <input type="file" accept="image/jpeg, image/png, image/webp" capture="environment" onchange="IdentityModule.handleUpload(event, 'photo')" />
                        </div>
                    </div>

                    <!-- Aadhaar -->
                    <div class="doc-item">
                        <h4>Aadhaar Card</h4>
                        <div class="doc-preview" id="preview-aadhaar">
                            <i data-lucide="file-text" style="color:#cbd5e1; width:32px; height:32px;"></i>
                        </div>
                        <div class="doc-actions upload-btn-wrapper">
                            <button class="btn-sm btn-view">Upload Image</button>
                            <input type="file" accept="image/jpeg, image/png, image/webp" capture="environment" onchange="IdentityModule.handleUpload(event, 'aadhaar')" />
                        </div>
                    </div>

                    <!-- PAN -->
                    <div class="doc-item">
                        <h4>PAN Card</h4>
                        <div class="doc-preview" id="preview-pan">
                            <i data-lucide="file-text" style="color:#cbd5e1; width:32px; height:32px;"></i>
                        </div>
                        <div class="doc-actions upload-btn-wrapper">
                            <button class="btn-sm btn-view">Upload Image</button>
                            <input type="file" accept="image/jpeg, image/png, image/webp" capture="environment" onchange="IdentityModule.handleUpload(event, 'pan')" />
                        </div>
                    </div>

                    <!-- DL -->
                    <div class="doc-item">
                        <h4>Driving Licence</h4>
                        <div class="doc-preview" id="preview-dl">
                            <i data-lucide="file-text" style="color:#cbd5e1; width:32px; height:32px;"></i>
                        </div>
                        <div class="doc-actions upload-btn-wrapper">
                            <button class="btn-sm btn-view">Upload Image</button>
                            <input type="file" accept="image/jpeg, image/png, image/webp" capture="environment" onchange="IdentityModule.handleUpload(event, 'dl')" />
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/StorageService.js"></script>
    <script src="../js/seed.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/ui-components.js"></script>
    <script src="../js/identity.js"></script>
    <script>
        AuthService.checkAuth('admin');
        UI.renderSidebar('identity');
        UI.renderTopNav('Identity Management');

        IdentityModule.initAdmin();
    </script>
</body>
</html>
